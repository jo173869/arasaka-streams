<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Arasaka Stream Hub — Movies</title>

  <style>
    body {
      background: #050505;
      color: #e0e0e0;
      font-family: 'Orbitron', sans-serif;
      margin: 0;
      padding: 0;
    }

    h1 {
      text-align: center;
      padding: 30px 0 10px;
      color: #ff004c;
      text-shadow: 0 0 10px #ff004c;
      letter-spacing: 2px;
    }

    .subtext {
      text-align: center;
      margin-bottom: 20px;
      color: #aaa;
      font-size: 14px;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 25px;
    }

    .tab {
      padding: 10px 20px;
      border: 1px solid #ff004c;
      color: #ff004c;
      cursor: pointer;
      transition: 0.2s;
      border-radius: 4px;
    }

    .tab.active,
    .tab:hover {
      background: #ff004c;
      color: #000;
      box-shadow: 0 0 10px #ff004c;
    }

    .search-box {
      text-align: center;
      margin-bottom: 25px;
    }

    .search-box input {
      width: 250px;
      padding: 10px;
      border: 1px solid #ff004c;
      background: #111;
      color: #fff;
      border-radius: 4px;
      outline: none;
    }

    .search-box button {
      padding: 10px 15px;
      margin-left: 10px;
      background: #ff004c;
      border: none;
      color: #000;
      cursor: pointer;
      border-radius: 4px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 25px;
      padding: 20px;
      width: 90%;
      margin: auto;
    }

    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      overflow: hidden;
      transition: 0.2s ease;
      cursor: pointer;
    }

    .card:hover {
      transform: scale(1.05);
      border-color: #ff004c;
      box-shadow: 0 0 15px #ff004c;
    }

    .card img {
      width: 100%;
      height: 270px;
      object-fit: cover;
    }

    .card-title {
      padding: 10px;
      font-size: 15px;
      text-align: center;
      color: #fff;
    }
  </style>
</head>

<body>

  <h1>MOVIES DATABASE</h1>
  <div class="subtext">Browse popular and top-rated films powered by TMDB.</div>

  <div class="tabs">
    <div class="tab active" id="popularTab">Popular</div>
    <div class="tab" id="topRatedTab">Top Rated</div>
  </div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Type a movie name (e.g., Inception)">
    <button onclick="searchMovies()">Search</button>
    <button onclick="clearSearch()">Clear</button>
  </div>

  <div id="movies" class="grid"></div>

  <script>
    const API_KEY = "YOUR_TMDB_KEY";
    const BASE_URL = "https://api.themoviedb.org/3";
    const IMG = "https://image.tmdb.org/t/p/w500";

    const moviesContainer = document.getElementById("movies");
    const popularTab = document.getElementById("popularTab");
    const topRatedTab = document.getElementById("topRatedTab");

    function setActive(tab) {
      popularTab.classList.remove("active");
      topRatedTab.classList.remove("active");
      tab.classList.add("active");
    }

    async function loadMovies(type = "popular") {
      setActive(type === "popular" ? popularTab : topRatedTab);

      const res = await fetch(`${BASE_URL}/movie/${type}?api_key=${API_KEY}`);
      const data = await res.json();

      renderMovies(data.results);
    }

    function renderMovies(list) {
      moviesContainer.innerHTML = "";

      list.forEach(movie => {
        const card = document.createElement("div");
        card.classList.add("card");

        card.innerHTML = `
          <img src="${IMG + movie.poster_path}" alt="${movie.title}">
          <div class="card-title">${movie.title}</div>
        `;

        card.onclick = () => {
          window.location.href = `movie.html?id=${movie.id}`;
        };

        moviesContainer.appendChild(card);
      });
    }

    async function searchMovies() {
      const query = document.getElementById("searchInput").value.trim();
      if (!query) return;

      const res = await fetch(`${BASE_URL}/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(query)}`);
      const data = await res.json();

      renderMovies(data.results);
    }

    function clearSearch() {
      document.getElementById("searchInput").value = "";
      loadMovies("popular");
    }

    loadMovies("popular");
  </script>

</body>
</html>
